name: Build Mac DMG

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Show files
        run: ls -la

      - name: Extract source
        run: unzip -q source.zip -d extracted

      - name: Install dependencies
        run: npm ci
        working-directory: extracted

      - name: Install server dependencies
        run: npm ci
        working-directory: extracted/server

      - name: Build Mac DMG
        run: npm run pack:mac
        working-directory: extracted

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: extracted/dist/*.dmg
